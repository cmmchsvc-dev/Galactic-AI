<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - Techno-Hippie Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #000000, #1a001a);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            z-index: 10;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 16px;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="score">Score: 0</div>
        <div id="gameOver">GAME OVER<br>Press R to Restart</div>
        <div id="instructions">Controls: W/↑ = Thrust, A/← = Rotate Left, D/→ = Rotate Right, SPACE = Fire</div>
    </div>

    <script>
        // Game constants and variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');

        let score = 0;
        let gameRunning = true;
        let keys = {};
        let ship;
        let asteroids = [];
        let lasers = [];
        let particles = [];
        let stars = [];
        let animationId;

        // Initialize canvas size
        function initCanvas() {
            canvas.width = window.innerWidth > 800 ? window.innerWidth : 800;
            canvas.height = window.innerHeight > 600 ? window.innerHeight : 600;
            ship = new Ship(canvas.width / 2, canvas.height / 2);
        }

        // Initialize stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        // Ship class
        class Ship {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.angle = 0;
                this.rotationSpeed = 0.08;
                this.thrustPower = 0.3;
                this.friction = 0.98;
                this.velocity = { x: 0, y: 0 };
                this.inertia = 0.95;
            }

            update() {
                // Rotation
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) this.angle -= this.rotationSpeed;
                if (keys['ArrowRight'] || keys['d'] || keys['D']) this.angle += this.rotationSpeed;

                // Thrust
                if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                    this.velocity.x += Math.cos(this.angle - Math.PI / 2) * this.thrustPower;
                    this.velocity.y += Math.sin(this.angle - Math.PI / 2) * this.thrustPower;
                }

                // Apply friction and inertia
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;

                // Update position with screen wrapping
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Ship body with glow effect
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(-this.radius, this.radius);
                ctx.lineTo(this.radius, this.radius);
                ctx.closePath();
                ctx.stroke();

                // Ship cockpit
                ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius / 2, 0, Math.PI * 2);
                ctx.fill();

                // Thruster effect
                if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    ctx.moveTo(-this.radius / 2, this.radius);
                    ctx.lineTo(0, this.radius + 15);
                    ctx.lineTo(this.radius / 2, this.radius);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // Asteroid class
        class Asteroid {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size || Math.random() * 30 + 20;
                this.speed = Math.random() * 1.5 + 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.vertices = Math.floor(Math.random() * 4) + 6; // 6-9 vertices
                this.offsets = [];
                for (let i = 0; i < this.vertices; i++) {
                    const angle = (i / this.vertices) * Math.PI * 2;
                    const distance = this.size * (0.7 + Math.random() * 0.6);
                    this.offsets.push({ angle, distance });
                }
            }

            update() {
                // Update position with screen wrapping
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.angle += this.rotationSpeed;

                if (this.x < -this.size) this.x = canvas.width + this.size;
                if (this.x > canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = canvas.height + this.size;
                if (this.y > canvas.height + this.size) this.y = -this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Asteroid with glow effect
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                for (let i = 0; i < this.vertices; i++) {
                    const offset = this.offsets[i];
                    const x = Math.cos(offset.angle) * offset.distance;
                    const y = Math.sin(offset.angle) * offset.distance;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Fill with semi-transparent color
                ctx.fillStyle = 'rgba(255, 0, 255, 0.1)';
                ctx.fill();

                ctx.restore();
            }
        }

        // Laser class
        class Laser {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle - Math.PI / 2;
                this.speed = 8;
                this.life = 60; // Frames to live
                this.radius = 2;
            }

            update() {
                // Update position
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life--;

                // Screen wrapping
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Laser with glow effect
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(this.speed, 0);
                ctx.stroke();

                ctx.restore();
            }
        }

        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.life = 30;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 30;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Create new asteroids
        function createAsteroids(count) {
            for (let i = 0; i < count; i++) {
                let x, y;
                const side = Math.floor(Math.random() * 4); // 0=top, 1=right, 2=bottom, 3=left
                switch (side) {
                    case 0: // Top
                        x = Math.random() * canvas.width;
                        y = -50;
                        break;
                    case 1: // Right
                        x = canvas.width + 50;
                        y = Math.random() * canvas.height;
                        break;
                    case 2: // Bottom
                        x = Math.random() * canvas.width;
                        y = canvas.height + 50;
                        break;
                    case 3: // Left
                        x = -50;
                        y = Math.random() * canvas.height;
                        break;
                }
                asteroids.push(new Asteroid(x, y));
            }
        }

        // Create explosion particles
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // Check collisions
        function checkCollisions() {
            // Laser vs Asteroid
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const asteroid = asteroids[j];
                    const dx = laser.x - asteroid.x;
                    const dy = laser.y - asteroid.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < asteroid.size) {
                        // Create explosion
                        createExplosion(asteroid.x, asteroid.y);
                        score += 100;
                        scoreElement.textContent = `Score: ${score}`;

                        // Break into smaller asteroids
                        if (asteroid.size > 20) {
                            for (let k = 0; k < 3; k++) {
                                const newAsteroid = new Asteroid(asteroid.x, asteroid.y, asteroid.size / 2);
                                asteroids.push(newAsteroid);
                            }
                        }

                        // Remove laser and asteroid
                        lasers.splice(i, 1);
                        asteroids.splice(j, 1);
                        break;
                    }
                }
            }

            // Ship vs Asteroid
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const asteroid = asteroids[i];
                const dx = ship.x - asteroid.x;
                const dy = ship.y - asteroid.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < ship.radius + asteroid.size) {
                    // Create explosion
                    createExplosion(ship.x, ship.y);
                    gameOver();
                    return;
                }
            }
        }

        // Game over function
        function gameOver() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
        }

        // Restart game
        function restartGame() {
            score = 0;
            scoreElement.textContent = `Score: ${score}`;
            gameOverElement.style.display = 'none';
            gameRunning = true;
            ship = new Ship(canvas.width / 2, canvas.height / 2);
            asteroids = [];
            lasers = [];
            particles = [];
            createAsteroids(5);
        }

        // Draw background stars
        function drawStars() {
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < stars.length; i++) {
                const star = stars[i];
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                // Move stars
                star.x -= star.speed;
                if (star.x < -10) {
                    star.x = canvas.width + 10;
                    star.y = Math.random() * canvas.height;
                }
            }
        }

        // Main game loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameRunning) {
                // Draw background stars
                drawStars();

                // Update and draw ship
                ship.update();
                ship.draw();

                // Update and draw asteroids
                for (let i = 0; i < asteroids.length; i++) {
                    asteroids[i].update();
                    asteroids[i].draw();
                }

                // Update and draw lasers
                for (let i = lasers.length - 1; i >= 0; i--) {
                    lasers[i].update();
                    lasers[i].draw();
                    if (lasers[i].life <= 0) {
                        lasers.splice(i, 1);
                    }
                }

                // Update and draw particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                // Check collisions
                checkCollisions();
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            // Fire laser
            if (e.key === ' ') {
                e.preventDefault();
                if (gameRunning) {
                    lasers.push(new Laser(ship.x, ship.y, ship.angle));
                }
            }

            // Restart game
            if (e.key === 'r' || e.key === 'R') {
                restartGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        window.addEventListener('resize', () => {
            initCanvas();
            initStars();
        });

        // Initialize game
        initCanvas();
        initStars();
        createAsteroids(5);
        gameLoop();
    </script>
</body>
</html>
