system:
  name: Galactic AI
  version: 1.5.1
  port: 9999
  heartbeat_interval: 5
  update_check_interval: 21600
models:
  primary_provider: ollama
  primary_model: hf.co/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M
  fallback_provider: google
  fallback_model: gemini-3-flash-preview
  planner_provider: google
  planner_model: gemini-3.1-pro-preview
  planner_fallback_provider: google
  planner_fallback_model: gemini-3-flash-preview
  auto_fallback: true
  smart_routing: false
  streaming: true
  speak_timeout: 600
  max_turns: 50
  context_window: 0
  context_window_trim: true
  recovery_time_seconds: 300
  fallback_cooldowns:
    AUTH_ERROR: 86400
    QUOTA_EXHAUSTED: 3600
    RATE_LIMIT: 60
    SERVER_ERROR: 30
    TIMEOUT: 10
  max_tokens: 0
  thinking_level: low
  nitro_only: false
providers:
  google:
    apiKey: YOUR_GOOGLE_API_KEY
    baseUrl: https://generativelanguage.googleapis.com/v1beta
  openrouter:
    apiKey: YOUR_OPENROUTER_API_KEY
    baseUrl: https://openrouter.ai/api/v1
  anthropic:
    apiKey: YOUR_ANTHROPIC_API_KEY
    baseUrl: https://api.anthropic.com/v1
  openai:
    apiKey: YOUR_OPENAI_API_KEY
    baseUrl: https://api.openai.com/v1
  xai:
    apiKey: YOUR_XAI_API_KEY
    baseUrl: https://api.x.ai/v1
  groq:
    apiKey: YOUR_GROQ_API_KEY
    baseUrl: https://api.groq.com/openai/v1
  deepseek:
    apiKey: YOUR_DEEPSEEK_API_KEY
    baseUrl: https://api.deepseek.com/v1
  nvidia:
    apiKey: YOUR_NVIDIA_API_KEY
    baseUrl: https://integrate.api.nvidia.com/v1
    keys:
      deepseek: ""
      glm: ""
      kimi: ""
      qwen: ""
      stepfun: ""
    fluxApiKey: ""
    fluxDevApiKey: ""
  ollama:
    baseUrl: http://127.0.0.1:11434/v1
  huggingface:
    apiKey: YOUR_HF_TOKEN
telegram:
  enabled: true
  bot_token: YOUR_TELEGRAM_BOT_TOKEN
  admin_chat_id: 'YOUR_CHAT_ID'
  timeout_seconds: 180
  ollama_timeout_seconds: 600
discord:
  enabled: false
  bot_token: ''
  admin_user_id: ''
  allowed_channels: []
  timeout_seconds: 120
  ollama_timeout_seconds: 600
whatsapp:
  enabled: false
  access_token: ''
  phone_number_id: ''
  verify_token: ''
  api_version: v21.0
  webhook_secret: ''
gmail:
  enabled: false
  email: YOUR_EMAIL
  app_password: YOUR_GMAIL_APP_PASSWORD
  check_interval: 60
  notify_telegram: true
social_media:
  twitter:
    consumer_key: ""
    consumer_secret: ""
    access_token: ""
    access_token_secret: ""
  reddit:
    client_id: ''
    client_secret: ''
    username: ''
    password: ''
    user_agent: GalacticAI/1.2.0
web:
  enabled: true
  host: 127.0.0.1
  port: 17789
  remote_access: false
  jwt_secret: ""
  password_hash: ""
browser:
  engine: chromium
  headless: false
chrome_bridge:
  enabled: true
  timeout: 30
elevenlabs:
  api_key: ''
  voice: Byte
video:
  provider: google
  google:
    model: veo-3.1
    default_aspect_ratio: '16:9'
    default_duration: 8
    default_resolution: 1080p
  luma:
    apiKey: ''
  runway:
    apiKey: ''
    model: gen4
paths:
  workspace: ./workspace
  logs: ./logs
  images: ./images
  chroma_data: ./chroma_data
  plugins: ./plugins
  watch: ./watch
tool_timeouts:
  exec_shell: 120
  execute_python: 60
  web_search: 15
  web_fetch: 30
  generate_image: 180
  analyze_image: 60
  generate_video: 300
webhooks:
  secret: ''
aliases: {}
gateway:
  provider: google
  model: gemini-2.5-flash
model_overrides:
  hf.co/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M:
    max_tokens: 0
    context_window: 65536
  hf.co/unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q5_K_M:
    max_tokens: 0
    context_window: 32768
  deepseek-r1:32b:
    max_tokens: 0
    context_window: 22768
  hf.co/unsloth/glm-4.7-flash-GGUF:Q4_K_M:
    max_tokens: 0
    context_window: 32536
  qwen3.5:27b-q4_K_M:
    max_tokens: 0
    context_window: 20768
  lfm2:24b-a2b:
    max_tokens: 0
    context_window: 131072
