# Centralized Models Configuration for Galactic AI
# You can add new models here or set 'enabled: false' to hide them from the UI.

# ── Fallback Policy ────────────────────────────────────────────────
# Controls the automatic fallback behavior when the primary model fails.
fallback_policy:
  # Models listed here will be tried in order by tier (1 is highest).
  # Only providers with valid API keys in config.yaml will be included.
  tiers:
    google:      { tier: 1, default_model: "gemini-3.1-pro-preview" }
    openai:      { tier: 1, default_model: "gpt-4o" }
    deepseek:    { tier: 2, default_model: "deepseek-chat" }
    mistral:     { tier: 2, default_model: "mistral-large-latest" }
    openrouter:  { tier: 3, default_model: "google/gemini-3.1-pro-preview" }
    huggingface: { tier: 3, default_model: "Qwen/Qwen3-235B-A22B" }
    kimi:        { tier: 3, default_model: "moonshotai/kimi-k2.5" }
    ollama:      { tier: 9, default_model: null } # Local fallback

# ── Smart Routing ──────────────────────────────────────────────────
# Mapping: task_type -> (provider, model_or_None)
smart_routing:
  coding:    { provider: "deepseek", model: "deepseek-chat" } 
  reasoning: { provider: "deepseek", model: "deepseek-reasoner" }
  creative:  { provider: "openai",   model: "gpt-4.5-turbo" } 
  math:      { provider: "openai",   model: "o3-mini" }
  vision:    { provider: "google",   model: "gemini-3.1-pro-preview" }
  chat:      { provider: "google",   model: "gemini-3.1-pro-preview" }
  quick:     { provider: "google",   model: "gemini-3.1-flash-lite-preview" }
